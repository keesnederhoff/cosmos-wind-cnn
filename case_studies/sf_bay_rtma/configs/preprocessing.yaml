# SF Bay RTMA Case Study - Preprocessing Configuration
#
# Target: RTMA 2.5 km (observation-constrained analysis), 2011-2026
# Input:  ERA5 ~31 km, interpolated onto the RTMA grid

# Reindex onto a complete hourly axis (NaN-fill ~1% missing RTMA hours) before splitting.
# The dataset's NaN-window dropping then excludes any sequence window spanning a gap.
regular_time_grid: true

# File mappings: variable_key -> filename in data/raw/
file_dict:

  # Wind U / V
  hr_u: 'RTMA_SFbay_2p5km_eastward_wind_2011_2026_UTM10.nc'
  lr_u: 'ERA5_eastward_wind_1940_2026_UTM.nc'
  hr_v: 'RTMA_SFbay_2p5km_northward_wind_2011_2026_UTM10.nc'
  lr_v: 'ERA5_northward_wind_1940_2026_UTM.nc'

  # Air temperature
  hr_air_temp: 'RTMA_SFbay_2p5km_air_temperature_2011_2026_UTM10.nc'
  lr_air_temp: 'ERA5_air_temperature_1940_2026_UTM.nc'

  # Dew point temperature
  hr_dew_temp: 'RTMA_SFbay_2p5km_dew_point_temperature_2011_2026_UTM10.nc'
  lr_dew_temp: 'ERA5_dew_point_temperature_1940_2026_UTM.nc'

  # Air pressure (RTMA = MSL pressure; ERA5 = msl-derived — consistent)
  hr_pressure: 'RTMA_SFbay_2p5km_air_pressure_fixed_height_2011_2026_UTM10.nc'
  lr_pressure: 'ERA5_air_pressure_fixed_height_1940_2026_UTM.nc'

  # Precipitation (mm/hr)
  hr_rain: 'RTMA_SFbay_2p5km_precipitation_2011_2026_UTM10.nc'
  lr_rain: 'ERA5_precipitation_1940_2026_UTM.nc'

  # ── Extra input-only fields (no HR target — fed in, not predicted) ───────────
  # ERA5 cloud cover (0-1 fraction), regridded onto the RTMA grid like other lr_.
  lr_cloud: 'ERA5_cloud_area_fraction_1940_2026_UTM.nc'
  # RTMA static surface height (terrain) — no time dim; broadcast over time.
  static_terrain: 'RTMA_SFbay_2p5km_surface_height_static_UTM10.nc'

# Time period — full ERA5 ∩ RTMA overlap
start_date: '2011-01-01'
end_date: '2026-06-18'

# Data split ratios
train_ratio: 0.7
val_ratio: 0.15
test_ratio: 0.15
compression_level: 1

# ── Physical value bounds (values outside [min, max] -> NaN) ──────────────────
physical_bounds:
  hr_u:        {min: -100,  max: 100}
  lr_u:        {min: -100,  max: 100}
  hr_v:        {min: -100,  max: 100}
  lr_v:        {min: -100,  max: 100}

  hr_air_temp: {min: 220, max: 330}
  lr_air_temp: {min: 220, max: 330}

  hr_dew_temp: {min: 200, max: 315}
  lr_dew_temp: {min: 200, max: 315}

  hr_pressure: {min: 85000, max: 110000}
  lr_pressure: {min: 85000, max: 110000}

  hr_rain:     {min: 0, max: 200}
  lr_rain:     {min: 0, max: 200}

  lr_cloud:       {min: -0.1, max: 1.1}     # ERA5 cloud area fraction (0-1)
  static_terrain: {min: -500, max: 5000}    # surface height (m)
