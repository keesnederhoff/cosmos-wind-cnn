# SF Bay Case Study - Inference Preprocessing Configuration
#
# Regrid coarse input data (ERA5, CMIP6, etc.) onto the CONUS404 target grid
# for inference with a trained model.
#
# Usage:
#   python scripts/preprocess_inference.py --case-study case_studies/sf_bay_conus404

# ── Source files to regrid ───────────────────────────────────────────────────
# Each entry maps an output variable name (matching the CNN's input_vars)
# to a source file and the variable name inside that file.
#
# output_name:          must match the low-res key in training.yaml variable_pairs
# file:                 filename in data/raw/  (or absolute path)
# source_var:           variable name inside the NetCDF (null = use first variable)
#
# You can add any number of sources here.  For CMIP6, just change the
# filenames and source_var names — the regridder is grid-agnostic.

sources:
  lr_u:
    file: 'ERA5_eastward_wind_1940_2026_UTM.nc'
    source_var: null                # auto-detect first variable
  lr_v:
    file: 'ERA5_northward_wind_1940_2026_UTM.nc'
    source_var: null
  lr_air_temp:
    file: 'ERA5_air_temperature_1940_2026_UTM.nc'
    source_var: null
  lr_dew_temp:
    file: 'ERA5_dew_point_temperature_1940_2026_UTM.nc'
    source_var: null
  lr_pressure:
    file: 'ERA5_air_pressure_fixed_height_1940_2026_UTM.nc'
    source_var: null
  lr_solar:
    file: 'ERA5_surface_solar_radiation_1940_2026_UTM.nc'
    source_var: null
  lr_thermal:
    file: 'ERA5_surface_thermal_radiation_1940_2026_UTM.nc'
    source_var: null
  lr_rain:
    file: 'ERA5_precipitation_1940_2026_UTM.nc'
    source_var: null

# ── Time period ──────────────────────────────────────────────────────────────
# Full ERA5 record (or any period you want to downscale).
# Set to null to use the full extent of each source file.
start_date: '1940-01-01'
end_date: '2027-01-01'

# ── Interpolation method ────────────────────────────────────────────────────
# 'linear' (default), 'nearest', or 'cubic'
interpolation_method: 'linear'

# ── Compression ─────────────────────────────────────────────────────────────
compression_level: 1   # 0 = none (fastest), 1-9 = zlib levels

# ── Physical value bounds ───────────────────────────────────────────────────
# Values outside [min, max] are replaced with NaN before interpolation.
# Must use the *output* variable names (lr_u, etc.), not the source names.
physical_bounds:
  lr_u:        {min: -100,  max: 100}
  lr_v:        {min: -100,  max: 100}
  lr_air_temp: {min: 220,   max: 330}
  lr_dew_temp: {min: 200,   max: 315}
  lr_pressure: {min: 85000, max: 110000}
  lr_solar:    {min:  -10,  max: 1100}
  lr_thermal:  {min: -250,  max: 100}
  lr_rain:     {min: 0,     max: 200}
