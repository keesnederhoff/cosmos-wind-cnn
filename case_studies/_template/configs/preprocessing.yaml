# Case Study Template - Preprocessing Configuration
#
# Copy this directory to create a new case study:
#   cp -r case_studies/_template case_studies/my_new_study
#
# Then edit the config files with your domain-specific settings.

# File mappings: variable_key -> filename in data/raw/
# Keys must match the variable pair names in training.yaml
file_dict:
  # High-resolution (target) and low-resolution (input) pairs.
  # Each pair has an hr_* (high-res) and lr_* (low-res) entry.
  hr_u: 'YOUR_HIGH_RES_U_WIND.nc'
  lr_u: 'YOUR_LOW_RES_U_WIND.nc'

  hr_v: 'YOUR_HIGH_RES_V_WIND.nc'
  lr_v: 'YOUR_LOW_RES_V_WIND.nc'

  hr_temp: 'YOUR_HIGH_RES_TEMPERATURE.nc'
  lr_temp: 'YOUR_LOW_RES_TEMPERATURE.nc'

  # Add more variable pairs as needed...

  # Additional input-only variables (not predicted, just used as context)
  cloud_area: 'YOUR_CLOUD_COVER.nc'

# Data split ratios (must sum to 1.0)
train_ratio: 0.7
val_ratio: 0.15
test_ratio: 0.15
